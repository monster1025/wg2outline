# Сборка образа и публикация на Docker Hub (hub.docker.com).
#
# Настройка в GitHub → Settings → Secrets and variables → Actions:
#   DOCKERHUB_USERNAME — логин Docker Hub
#   DOCKERHUB_TOKEN     — Access Token (рекомендуется), см. https://hub.docker.com/settings/security
#
# Опционально: Variables → DOCKERHUB_IMAGE (например org/max2telegram), если имя образа
# отличается от <DOCKERHUB_USERNAME>/max2telegram.
#
# Теги образа:
#   push в master → dev (+ sha)
#   push тега v*  → {{version}}, {{major}}.{{minor}}, latest (+ sha)

name: Docker Hub

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: docker-hub-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write # кэш слоёв Buildx (type=gha)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          if [ -n "${{ vars.DOCKERHUB_IMAGE }}" ]; then
            echo "name=${{ vars.DOCKERHUB_IMAGE }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ secrets.DOCKERHUB_USERNAME }}/max2telegram" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (теги)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
